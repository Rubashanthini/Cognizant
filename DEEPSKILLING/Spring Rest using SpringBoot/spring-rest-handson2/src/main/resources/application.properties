# =========================================================
# Application Identity
# =========================================================
spring.application.name=spring-learn

# =========================================================
# Server Configuration
# =========================================================
server.port=8083

# =========================================================
# Logging Configuration
# =========================================================
# Framework-level logging (Spring internals) kept at INFO to avoid noisy output
logging.level.org.springframework=INFO

# Application-level logging kept at DEBUG so START/DEBUG/END statements are visible
logging.level.com.cognizant.springlearn=DEBUG

# Custom console log pattern: timestamp - level - logger name - message
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level - %logger{36} - %msg%n
