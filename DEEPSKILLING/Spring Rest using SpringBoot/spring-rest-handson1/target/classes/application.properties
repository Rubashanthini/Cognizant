# =========================================================
# Application Identity
# =========================================================
spring.application.name=spring-learn

# =========================================================
# Server Configuration
# =========================================================
server.port=8080

# =========================================================
# Logging Configuration
# =========================================================
# Root / framework logging level
logging.level.root=INFO
logging.level.org.springframework=INFO

# Application specific package - set to DEBUG so START/END and DEBUG logs are visible
logging.level.com.cognizant.springlearn=DEBUG

# Console log pattern - includes timestamp, thread, log level, logger name and message
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %-5level [%thread] %logger{36} - %msg%n

# =========================================================
# DevTools Configuration
# =========================================================
spring.devtools.restart.enabled=true
