# =====================================================================
# Exercise 9: Spring Boot / Spring Data JPA / H2 configuration
# =====================================================================

# Application name
spring.application.name=LibraryManagement

# ---------------------------------------------------------------------
# H2 in-memory database connection
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:librarydb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---------------------------------------------------------------------
# JPA / Hibernate configuration
# ---------------------------------------------------------------------
# Schema is created explicitly from schema.sql (ddl-auto=none), and sample
# data is loaded from data.sql - see spring.sql.init.mode below.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Run schema.sql / data.sql on every startup, and run them AFTER Hibernate
# initializes (so JPA metadata is ready, though ddl-auto=none means Hibernate
# does not touch the schema itself).
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ---------------------------------------------------------------------
# H2 web console (optional, handy for manually inspecting the database)
# Visit http://localhost:8080/h2-console while the app is running.
# JDBC URL to use in the console: jdbc:h2:mem:librarydb
# ---------------------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------------
# Server configuration
# ---------------------------------------------------------------------
server.port=8080
