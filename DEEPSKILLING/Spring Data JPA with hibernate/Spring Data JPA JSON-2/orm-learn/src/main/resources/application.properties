# ==========================================================
# Application Info
# ==========================================================
spring.application.name=orm-learn
server.port=8080

# ==========================================================
# MySQL Datasource Configuration
# ==========================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD

# ==========================================================
# JPA / Hibernate Configuration
# ==========================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# ==========================================================
# schema.sql / data.sql initialization
# ==========================================================
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ==========================================================
# Logging
# ==========================================================
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.cognizant.ormlearn=DEBUG
