# ==========================================================
# Server Configuration
# ==========================================================
server.port=8080

# ==========================================================
# MySQL Datasource Configuration
# ==========================================================
spring.datasource.url=jdbc:mysql://localhost:3306/orm_learn_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=YOUR_MYSQL_PASSWORD
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================================
# JPA / Hibernate Configuration
# ==========================================================
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.use_sql_comments=true
spring.jpa.open-in-view=false

# ==========================================================
# SQL Init - run schema.sql / data.sql after Hibernate creates tables
# Set ddl-auto=none and enable these two lines if you prefer to
# manage the schema entirely through schema.sql / data.sql instead.
# ==========================================================
spring.sql.init.mode=never
spring.sql.init.continue-on-error=true
# spring.jpa.defer-datasource-initialization=true

# ==========================================================
# Logging
# ==========================================================
logging.level.root=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.cognizant.ormlearn=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n
