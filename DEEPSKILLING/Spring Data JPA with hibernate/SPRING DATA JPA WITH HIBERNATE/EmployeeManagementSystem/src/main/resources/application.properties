########################################################################
# EMPLOYEE MANAGEMENT SYSTEM - APPLICATION PROPERTIES
# Cognizant Digital Nurture 5.0 - Spring Data JPA and Hibernate
########################################################################

# ---------------------------------------------------------------------
# Server Configuration
# ---------------------------------------------------------------------
server.port=8080

# ---------------------------------------------------------------------
# Exercise 1 & 9: Primary (H2) Data Source Configuration
# Externalized configuration - values can be overridden via env vars
# or -D system properties without touching application code.
# ---------------------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# H2 Console - useful for verifying schema/data during development
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------------------
# Exercise 9: Secondary Data Source (Audit Log DB) - demonstrates
# managing multiple data sources within a single application.
# Consumed by com.cognizant.employeesystem.config.SecondaryDataSourceConfig
# ---------------------------------------------------------------------
app.datasource.secondary.url=jdbc:h2:mem:auditdb
app.datasource.secondary.driver-class-name=org.h2.Driver
app.datasource.secondary.username=sa
app.datasource.secondary.password=password

# ---------------------------------------------------------------------
# JPA / Hibernate General Configuration
# ddl-auto=none because schema.sql/data.sql manage the primary schema
# ---------------------------------------------------------------------
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# Ensures schema.sql/data.sql run AFTER Hibernate initializes (Spring Boot 2.5+)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ---------------------------------------------------------------------
# Exercise 10: Hibernate-Specific Performance / Batch Processing Settings
# ---------------------------------------------------------------------
# Batch insert/update size - Hibernate groups statements into batches
spring.jpa.properties.hibernate.jdbc.batch_size=20
# Ensures inserts/updates of the same type are grouped together for batching
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
# Allows batching even when using GenerationType.IDENTITY in some dialects
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true
# Fetch size for reads - reduces DB round trips for large result sets
spring.jpa.properties.hibernate.jdbc.fetch_size=50
# Second-level cache disabled explicitly for this demo project
spring.jpa.properties.hibernate.cache.use_second_level_cache=false
# Explicit dialect (also set above via spring.jpa.database-platform)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ---------------------------------------------------------------------
# Logging - helpful to observe batching and generated SQL
# ---------------------------------------------------------------------
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.cognizant.employeesystem=INFO
