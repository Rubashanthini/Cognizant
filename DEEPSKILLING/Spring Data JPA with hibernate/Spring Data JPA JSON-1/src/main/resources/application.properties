# =========================================================
# Application name
# =========================================================
spring.application.name=orm-learn

# =========================================================
# Spring Framework and application log levels
# =========================================================
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL, input and output parameters
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern (console)
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# =========================================================
# Database configuration (MySQL 8)
# =========================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root

# =========================================================
# Hibernate configuration
# =========================================================
# ddl-auto (create, create-drop, update, validate)
# 'update' is used here so the "country" table is created automatically
# on startup for the hands-on exercises. Switch to 'validate' once the
# schema is managed manually, as shown in Hands-on 1 of the exercise doc.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# =========================================================
# schema.sql / data.sql initialization
# =========================================================
# 'always' so schema.sql / data.sql run every startup (useful while learning).
# Since ddl-auto=update already creates the table, schema.sql uses
# "CREATE TABLE IF NOT EXISTS" and data.sql uses "INSERT IGNORE" to avoid
# duplicate key errors on repeated restarts.
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true
