# ---------------------------------------------------------------------------
# Supplementary configuration.
#
# Primary application configuration (OAuth2 client, resource server, JWT)
# lives in application.yml. This file holds additional, non-conflicting
# Spring Boot settings expressed in the traditional key/value properties
# format, as required by the project specification.
# ---------------------------------------------------------------------------

# Show a concise startup banner and suppress verbose auto-configuration logs.
spring.main.banner-mode=console
spring.output.ansi.enabled=always

# Return well-formed JSON error bodies (status, error, message, path) instead
# of a whitelabel HTML error page.
server.error.include-message=always
server.error.include-binding-errors=always

# Actuator health endpoint only, useful for verifying the app started.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
