# =============================================================================
# loan-service configuration
# =============================================================================

# Logical service name registered with Eureka. The api-gateway routes to
# this service using this exact name (lower-cased) as the path prefix:
#   http://localhost:9090/loan-service/loans/{number}
spring.application.name=loan-service

# loan-service listens on port 8081 (account-service already occupies 8080)
server.port=8081

# Location of the Eureka Discovery Server that this service registers with
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.instance.prefer-ip-address=true

# Expose actuator health/info endpoints, useful for container health checks
# and for the Eureka client's own health indicator.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# Application level logging
logging.level.com.cognizant.loan=INFO
