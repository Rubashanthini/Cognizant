# =============================================================================
# eureka-discovery-server configuration
# =============================================================================

spring.application.name=eureka-discovery-server

# The Eureka Server itself listens on the well-known port 8761
server.port=8761

# This node is a standalone Eureka server: it must not attempt to register
# with itself, nor try to fetch a registry from another peer node.
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.instance.hostname=localhost

# Quiet down the very chatty internal Netflix Eureka/Discovery logging.
logging.level.com.netflix.eureka=OFF
logging.level.com.netflix.discovery=OFF

# Expose actuator health/info endpoints, useful for container health checks.
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
