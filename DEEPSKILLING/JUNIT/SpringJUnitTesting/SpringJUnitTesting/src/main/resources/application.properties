# =========================================================
# SpringJUnitTesting - application.properties
# =========================================================

# Application name
spring.application.name=SpringJUnitTesting

# ---------------------------------------------------------
# H2 In-Memory Database Configuration
# ---------------------------------------------------------
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# ---------------------------------------------------------
# JPA / Hibernate Configuration
# ---------------------------------------------------------
# Do not let Hibernate auto-generate the schema; schema.sql is used instead.
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Ensure schema.sql / data.sql always run (Spring Boot 2.5+ default behavior change)
spring.sql.init.mode=always
spring.jpa.defer-datasource-initialization=true

# ---------------------------------------------------------
# H2 Console (useful for local debugging via /h2-console)
# ---------------------------------------------------------
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ---------------------------------------------------------
# Server Configuration
# ---------------------------------------------------------
server.port=8080
